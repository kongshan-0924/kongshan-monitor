# /etc/nginx/sites-available/outpost — TLS 终止 + 反代(含 WebSocket)
# 证书由 deploy/gen-pki.sh 生成(私有 CA + IP SAN)。

map $http_upgrade $op_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 25510 ssl;
    listen [::]:25510 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/outpost/pki/server-fullchain.pem;
    ssl_certificate_key /etc/outpost/pki/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:OutpostSSL:2m;

    client_max_body_size 128k;

    location / {
        proxy_pass http://127.0.0.1:25511;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $op_connection_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
