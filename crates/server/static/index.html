<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Outpost 哨站 · 总览</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/app.css">
</head>
<body data-page="dashboard" data-auth="1">
<header class="topbar">
  <a class="brand" href="/"><span class="brand-dot"></span>Outpost 哨站</a>
  <nav class="nav">
    <a href="/" class="active">总览</a>
    <a href="/servers">服务器</a>
    <a href="/compare">对比</a>
    <a href="/alerts">告警<span id="navBadge" class="badge hidden">0</span></a>
    <a href="/settings">设置</a>
  </nav>
  <div class="top-actions">
    <button id="customBtn" class="btn ghost sm">自定义卡片</button>
    <button id="themeBtn" class="btn icon" title="切换浅色/深色">◐</button>
    <button id="logoutBtn" class="btn ghost sm">退出</button>
  </div>
</header>

<main class="wrap">
  <section class="summary" id="summary"></section>

  <div class="toolbar" id="toolbar">
    <input id="search" type="search" placeholder="搜索名称 / 主机名 / 系统…" class="tb-search">
    <select id="groupFilter" class="tb-sel"><option value="">全部分组</option></select>
    <select id="sortBy" class="tb-sel">
      <option value="status">按状态(告警/离线优先)</option>
      <option value="name">按名称</option>
      <option value="cpu">按 CPU</option>
      <option value="mem">按内存</option>
    </select>
  </div>

  <div id="empty" class="empty hidden">
    <p>还没有节点。到「<a href="/servers">服务器</a>」管理页添加节点,生成安装命令即可接入第一台服务器。</p>
  </div>
  <div id="grid" class="grid"></div>
</main>

<dialog id="customDlg" class="dlg">
  <form method="dialog" class="dlg-body" id="customForm">
    <h3>自定义卡片展示</h3>
    <p class="hint subtle">勾选总览卡片上要显示的模块(本地保存,仅影响你自己的浏览器)。</p>
    <div id="fieldList" class="chk-grid"></div>
    <div class="dlg-actions">
      <button id="customReset" type="button" class="btn ghost">恢复默认</button>
      <button value="ok" class="btn primary" type="submit">完成</button>
    </div>
  </form>
</dialog>

<script src="/static/app.js"></script>
<script src="/static/dashboard.js"></script>
</body>
</html>
