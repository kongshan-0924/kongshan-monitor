<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>空山Outpost · 总览</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/app.css?v=__V__">
</head>
<body data-page="dashboard" data-auth="1">
<header class="topbar">
  <a class="brand" href="/"><span class="brand-dot"></span>空山Outpost</a>
  <nav class="nav">
    <a href="/" class="active">总览</a>
    <a href="/servers">服务器</a>
    <a href="/compare">对比</a>
    <a href="/alerts">告警<span id="navBadge" class="badge hidden">0</span></a>
    <a href="/settings">设置</a>
  </nav>
  <div class="top-actions">
    <button id="customBtn" class="btn ghost sm">自定义卡片</button>
    <button id="themeBtn" class="btn icon" title="切换浅色/深色" aria-label="切换浅色/深色">◐</button>
    <button id="logoutBtn" class="btn ghost sm">退出</button>
  </div>
</header>

<main class="wrap">
  <section class="summary" id="summary"></section>

  <section class="card pad hidden" id="trendCard">
    <div class="row-head">
      <h3>全局趋势</h3>
      <select id="trendRange" class="tb-sel" style="width:auto">
        <option value="3600">最近 1 小时</option>
        <option value="21600">最近 6 小时</option>
        <option value="86400" selected>最近 24 小时</option>
        <option value="604800">最近 7 天</option>
        <option value="2592000">最近 30 天</option>
      </select>
      <button id="trendCustomBtn" class="btn ghost sm" style="margin-left:auto">自定义</button>
    </div>
    <div class="charts2" id="trendGrid"></div>
  </section>

  <div class="toolbar" id="toolbar">
    <input id="search" type="search" aria-label="搜索" placeholder="搜索名称 / 主机名 / 系统…" class="tb-search">
    <select id="groupFilter" class="tb-sel"><option value="">全部分组</option></select>
    <select id="sortBy" class="tb-sel">
      <option value="status">按状态(告警/离线优先)</option>
      <option value="custom">自定义顺序(服务器管理拖拽)</option>
      <option value="name">按名称</option>
      <option value="cpu">按 CPU</option>
      <option value="mem">按内存</option>
    </select>
    <div class="seg" id="viewToggle" role="group" aria-label="切换展示方式">
      <button type="button" data-view="grid" aria-label="卡片网格">卡片</button>
      <button type="button" data-view="list" aria-label="紧凑列表">列表</button>
    </div>
  </div>

  <div id="empty" class="empty hidden">
    <p>还没有节点。到「<a href="/servers">服务器</a>」管理页添加节点,生成安装命令即可接入第一台服务器。</p>
  </div>
  <div id="grid" class="grid"></div>
</main>

<dialog id="customDlg" class="dlg">
  <form method="dialog" class="dlg-body" id="customForm">
    <h3>自定义卡片展示</h3>
    <p class="hint subtle">勾选总览卡片上要显示的模块(本地保存,仅影响你自己的浏览器)。</p>
    <div id="fieldList" class="chk-grid"></div>
    <div class="dlg-actions">
      <button id="customReset" type="button" class="btn ghost">恢复默认</button>
      <button value="ok" class="btn primary" type="submit">完成</button>
    </div>
  </form>
</dialog>

<dialog id="trendDlg" class="dlg">
  <form method="dialog" class="dlg-body" id="trendForm">
    <h3>自定义全局趋势</h3>
    <p class="hint subtle">勾选全局趋势里要显示的图表(本地保存,仅影响你自己的浏览器)。</p>
    <div id="trendList" class="chk-grid"></div>
    <div class="dlg-actions">
      <button id="trendReset" type="button" class="btn ghost">恢复默认</button>
      <button value="ok" class="btn primary" type="submit">完成</button>
    </div>
  </form>
</dialog>

<script src="/static/app.js?v=__V__"></script>
<script src="/static/chart.js?v=__V__"></script>
<script src="/static/dashboard.js?v=__V__"></script>
<footer class="site-footer">空山Outpost v__VERSION__</footer>
</body>
</html>
