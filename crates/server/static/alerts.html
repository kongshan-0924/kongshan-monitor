<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Outpost 哨站 · 告警</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/app.css?v=__V__">
</head>
<body data-page="alerts" data-auth="1">
<header class="topbar">
  <a class="brand" href="/"><span class="brand-dot"></span>Outpost 哨站</a>
  <nav class="nav">
    <a href="/">总览</a>
    <a href="/servers">服务器</a>
    <a href="/compare">对比</a>
    <a href="/alerts" class="active">告警<span id="navBadge" class="badge hidden">0</span></a>
    <a href="/settings">设置</a>
  </nav>
  <div class="top-actions">
    <button id="themeBtn" class="btn icon" title="切换浅色/深色">◐</button>
    <button id="logoutBtn" class="btn ghost sm">退出</button>
  </div>
</header>

<main class="wrap">
  <section class="card pad">
    <div class="row-head">
      <h3>当前告警 / 历史事件</h3>
      <span id="firingCount" class="subtle"></span>
    </div>
    <table class="tbl" id="eventTbl"></table>
  </section>

  <section class="card pad">
    <div class="row-head">
      <h3>告警规则</h3>
      <button id="addRuleBtn" class="btn primary sm">新增规则</button>
    </div>
    <table class="tbl" id="ruleTbl"></table>
  </section>

  <section class="card pad">
    <div class="row-head">
      <h3>通知渠道(Webhook)</h3>
      <button id="addChanBtn" class="btn primary sm">新增渠道</button>
    </div>
    <p class="hint subtle">支持飞书 / 钉钉 / 企业微信 / Slack 群机器人、Telegram、Bark、邮件(SMTP)。
      出站强制 https / TLS 并做 SSRF 校验:默认拒绝私网/回环目标。</p>
    <table class="tbl" id="chanTbl"></table>
    <div class="row-head" style="margin-top:16px">
      <label class="hint" style="display:flex;align-items:center;gap:8px;margin:0">重复提醒:未恢复告警每隔
        <select id="renotifySel" class="tb-sel" style="width:auto">
          <option value="0">关闭</option>
          <option value="600">10 分钟</option>
          <option value="1800">30 分钟</option>
          <option value="3600">1 小时</option>
          <option value="21600">6 小时</option>
          <option value="86400">24 小时</option>
        </select>
        重发一次
      </label>
      <button id="notifyBtn" class="btn ghost sm">开启桌面通知</button>
      <span id="renotifyMsg" class="subtle"></span>
    </div>
  </section>

  <section class="card pad">
    <div class="row-head">
      <h3>维护窗口 / 静默</h3>
      <button id="addSilenceBtn" class="btn primary sm">新增静默</button>
    </div>
    <p class="hint subtle">静默期内命中的(节点 × 规则)不外发通知,但仍记录事件、在 UI 显示。适合计划维护时段。</p>
    <table class="tbl" id="silenceTbl"></table>
  </section>
</main>

<dialog id="ruleDlg" class="dlg">
  <form method="dialog" class="dlg-body" id="ruleForm">
    <h3>新增告警规则</h3>
    <label>规则名 <input id="rName" type="text" maxlength="64" required placeholder="例如:CPU 过高"></label>
    <label>指标
      <select id="rMetric">
        <option value="cpu_pct">CPU 使用率 (%)</option>
        <option value="mem_pct">内存使用率 (%)</option>
        <option value="disk_pct">磁盘使用率 (%)</option>
        <option value="swap_pct">Swap 使用率 (%)</option>
        <option value="load1">1 分钟负载</option>
        <option value="cpu_temp">CPU 温度 (℃)</option>
        <option value="tcp_conns">TCP 连接数</option>
        <option value="inode_pct">inode 使用率 (%)</option>
        <option value="services_down">异常服务数</option>
        <option value="offline">节点离线</option>
      </select>
    </label>
    <div id="threshRow">
      <label>条件
        <select id="rComparator">
          <option value="gt">大于 &gt;</option>
          <option value="gte">大于等于 ≥</option>
          <option value="lt">小于 &lt;</option>
          <option value="lte">小于等于 ≤</option>
        </select>
      </label>
      <label>阈值 <input id="rThreshold" type="number" step="any" min="0" value="90"></label>
    </div>
    <label>持续时间(秒,连续超限多久才告警;离线时为容忍时长)
      <input id="rDuration" type="number" min="0" max="86400" value="60">
    </label>
    <label>严重度(决定推送到哪些渠道)
      <select id="rSeverity">
        <option value="info">信息 info</option>
        <option value="warning" selected>警告 warning</option>
        <option value="critical">严重 critical</option>
      </select>
    </label>
    <label>作用范围
      <select id="rNode"><option value="">所有节点</option></select>
    </label>
    <div class="dlg-actions">
      <button value="cancel" class="btn ghost" formnovalidate>取消</button>
      <button class="btn primary" type="submit">创建</button>
    </div>
    <div id="ruleMsg" class="msg err"></div>
  </form>
</dialog>

<dialog id="chanDlg" class="dlg">
  <form method="dialog" class="dlg-body" id="chanForm">
    <h3>新增通知渠道</h3>
    <label>名称 <input id="cName" type="text" maxlength="64" required placeholder="例如:运维告警群"></label>
    <label>类型
      <select id="cKind">
        <option value="webhook">Webhook(飞书/钉钉/企业微信/Slack/通用)</option>
        <option value="telegram">Telegram Bot</option>
        <option value="bark">Bark(iOS 推送)</option>
        <option value="smtp">邮件(SMTP)</option>
      </select>
    </label>
    <label id="cUrlLabel">Webhook URL(https)
      <input id="cUrl" type="text" maxlength="2048" placeholder="https://open.feishu.cn/open-apis/bot/v2/hook/...">
    </label>
    <label id="cTargetLabel" class="hidden">Chat ID(数字或 @频道名)
      <input id="cTarget" type="text" maxlength="40" placeholder="例如:123456789 或 @mychannel">
    </label>
    <div id="smtpFields" class="hidden">
      <div class="threshRow">
        <label>SMTP 服务器 <input id="cSmtpHost" type="text" maxlength="255" placeholder="smtp.example.com"></label>
        <label>端口 <input id="cSmtpPort" type="number" min="1" max="65535" value="465"></label>
      </div>
      <label>账号(用户名) <input id="cSmtpUser" type="text" maxlength="320" autocomplete="off" placeholder="登录 SMTP 的用户名"></label>
      <label>密码 / 授权码 <input id="cSmtpPass" type="password" maxlength="256" autocomplete="new-password" placeholder="邮箱 SMTP 授权码"></label>
      <div class="threshRow">
        <label>发件人 <input id="cSmtpFrom" type="email" maxlength="254" placeholder="alert@example.com"></label>
        <label>收件人 <input id="cSmtpTo" type="email" maxlength="254" placeholder="ops@example.com"></label>
      </div>
      <p class="hint subtle">仅支持隐式 TLS(SMTPS,默认 465)。目标经 SSRF 校验,默认拒绝私网地址。</p>
    </div>
    <label>最低接收严重度(渠道只接收 ≥ 此级别的告警)
      <select id="cMinSev">
        <option value="info" selected>信息 info(接收全部)</option>
        <option value="warning">警告 warning 及以上</option>
        <option value="critical">仅严重 critical</option>
      </select>
    </label>
    <div class="dlg-actions">
      <button value="cancel" class="btn ghost" formnovalidate>取消</button>
      <button class="btn primary" type="submit">保存</button>
    </div>
    <div id="chanMsg" class="msg err"></div>
  </form>
</dialog>

<dialog id="silenceDlg" class="dlg">
  <form method="dialog" class="dlg-body" id="silenceForm">
    <h3>新增静默窗口</h3>
    <label>作用节点
      <select id="sNode"><option value="">所有节点</option></select>
    </label>
    <label>作用规则
      <select id="sRule"><option value="">所有规则</option></select>
    </label>
    <label>静默时长
      <select id="sDuration">
        <option value="3600">1 小时</option>
        <option value="7200">2 小时</option>
        <option value="21600">6 小时</option>
        <option value="86400">1 天</option>
        <option value="259200">3 天</option>
      </select>
    </label>
    <label>原因(可选) <input id="sReason" type="text" maxlength="200" placeholder="例如:计划内维护"></label>
    <div class="dlg-actions">
      <button value="cancel" class="btn ghost" formnovalidate>取消</button>
      <button class="btn primary" type="submit">创建</button>
    </div>
    <div id="silenceMsg" class="msg err"></div>
  </form>
</dialog>

<script src="/static/app.js?v=__V__"></script>
<script src="/static/alerts.js?v=__V__"></script>
</body>
</html>
