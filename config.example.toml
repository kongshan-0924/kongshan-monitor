# Outpost 哨站 — 服务端配置示例(带注释)。
# 实际部署:复制到 /etc/outpost/config.toml,权限 0640 root:outpost。
# 所有项均可用环境变量覆盖:OUTPOST_SERVER__LISTEN、OUTPOST_SECURITY__HSTS 等。

[server]
# 监听地址。默认仅回环(位于 nginx TLS 反代之后)。
# 若不用反代:启用 [server.tls] 后可改为 0.0.0.0:25510。
listen = "127.0.0.1:25511"
# 位于可信反向代理之后(启用 X-Real-IP 解析)
behind_proxy = true
trusted_proxies = ["127.0.0.1", "::1"]
# 面板对外地址(Origin 校验与安装命令渲染),必须 https
public_url = "https://YOUR_IP_OR_DOMAIN:25510"
# 额外允许的浏览器 Origin(如同时用域名与 IP 访问)
extra_origins = []
# 危险项:允许非回环明文监听(默认 false,勿开启)
allow_plain_nonloopback = false

[server.tls]
# 内置 rustls 直接终止 TLS(不经 nginx 时用)
enabled = false
cert_path = ""
key_path = ""

[security]
cookie_secure = true
session_ttl_hours = 24
hsts = true

[storage]
db_path = "/var/lib/outpost/outpost.db"

[install]
# pinned_ca: 私有 CA + 安装命令指纹钉扎(无域名/自签场景,推荐)
# public_ca: 服务器证书由公共 CA 签发(有域名 + Let's Encrypt 等)
mode = "pinned_ca"
ca_cert_path = "/etc/outpost/pki/ca.pem"
# agent 静态二进制目录(启动时计算 SHA-256 供安装脚本校验)
dist_dir = "/var/lib/outpost/dist"

[metrics]
# 单条 WS 消息上限(字节)
ws_max_message_bytes = 262144
# 允许的 agent 时钟偏移(秒),超出即拒绝该条上报
ts_skew_secs = 300

[notify]
# 告警 Webhook 出站默认做 SSRF 校验:拒绝私网/回环/链路本地/云元数据等目标。
# 仅当你要把告警发往【内网自建接收端】时才设为 true,并确保网络边界可信。
allow_private_targets = false
